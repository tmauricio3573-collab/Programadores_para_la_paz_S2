<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario Participa</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main>
    <section class="contenedor">
      <h1>Tu voz en la comunidad</h1>

      <p>
        Hagamoslo Comunidad! Participa para que tu voz nos ayude a crecer, compartir tus ideas y estar siempre al tanto de los que sucede.
        La información será usada únicamente con fines de participación y organización comunitaria sin fines de uso privado.
      </p>

      <form>
        <div class="campo">
          <label for="nombre">Nombre completo del paricipante:
          </label>
          <input 
            type="text" 
            id="nombre" 
            name="nombre" 
            placeholder="Escribe tu nombre completo">
        </div>

        <div class="campo">
          <label for="propuesta">Tu voz se escucha</label>
          <textarea 
            id="propuesta" 
            name="propuesta" 
            placeholder="Escribe tu propuesta para la comunidad en una cantidad de 4 lineas de texto"></textarea>
        </div>

        <div class="campo">
          <label for="contacto">Email/whatsapp o facebook de contacto opcional</label>
          <input 
            type="text" 
            id="contacto" 
            name="contacto" 
            placeholder="Este campo es opcional">
        </div>

        <div class="campo">
          <label>
            <input type="checkbox" name="consentimiento">
            Acepto que mi información sea usada únicamente para fines de participación comunitaria.
          </label>
        </div>

        <button type="submit">PARTICIPAR</button>
      </form>
    </section>
  </main>

</body>
</html>
